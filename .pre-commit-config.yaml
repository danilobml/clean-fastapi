repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.7
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: mypy
        name: mypy .
        language: system
        types: [python3]
        pass_filenames: false
      - id: pytest
        name: pytest
        language: system
        types: [python3]
        pass_filenames: false